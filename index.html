<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Bus Tracker — Happy Valley</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #aeaeb2;
      --accent: #007AFF;
      --green: #34C759;
      --indigo: #5856D6;
      --purple: #AF52DE;
      --orange: #FF9500;
      --red: #FF3B30;
      --teal: #30B0C7;
      --separator: #e5e5ea;
      --fill: #f2f2f7;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    /* ── Header ─────────────────────────────────── */
    header { text-align: center; margin-bottom: 6px; }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header-location {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── Status bar ─────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 20px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .status-dot.error { background: var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Segmented Control ──────────────────────── */
    .seg-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .seg-control {
      display: inline-flex;
      background: var(--fill);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .seg-btn {
      padding: 7px 24px;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .seg-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .seg-btn:not(.active):hover {
      color: var(--text);
    }

    /* ── Route tags ─────────────────────────────── */
    .route-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      flex-shrink: 0;
      line-height: 1.3;
    }
    .route-tag.r1   { background: #34C75922; color: #248A3D; }
    .route-tag.r8x  { background: #5856D622; color: #4240B0; }
    .route-tag.r1m  { background: #AF52DE22; color: #8944AB; }
    .route-tag.gmb  { background: #FF950022; color: #C77600; }
    .route-tag.gmb5 { background: #34C75922; color: #248A3D; }
    .route-tag.r72  { background: #30B0C722; color: #1A8A9E; }
    .route-tag.gmb4c{ background: #5856D622; color: #4240B0; }

    /* ── Section labels ─────────────────────────── */
    .feed-section { margin-bottom: 20px; }

    .section-label {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-secondary); margin-bottom: 4px;
    }

    .stop-name-header {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.3px; color: var(--text);
    }

    .stop-name-header-cn {
      font-size: 14px; color: var(--text-secondary); margin-top: 1px;
    }

    .stop-note {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
      font-style: italic;
    }

    /* ── Hero card ──────────────────────────────── */
    .hero-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }

    .hero-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

    .hero-body {
      display: flex; align-items: flex-end; justify-content: space-between;
    }

    .hero-mins {
      font-size: 54px; font-weight: 700; line-height: 1;
      color: var(--text); letter-spacing: -2px;
      font-feature-settings: 'tnum';
      transition: color 0.3s ease;
    }
    .hero-mins.arriving { color: var(--green); }

    .hero-unit {
      font-size: 18px; font-weight: 500;
      color: var(--text-secondary); margin-left: 4px; letter-spacing: 0;
    }

    .hero-right { text-align: right; padding-bottom: 6px; }
    .hero-dest { font-size: 15px; color: var(--text-secondary); margin-bottom: 2px; }
    .hero-abs {
      font-size: 15px; font-weight: 600; color: var(--text);
      font-feature-settings: 'tnum';
    }

    /* ── Upcoming list ──────────────────────────── */
    .upcoming-list {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 28px;
    }

    .upcoming-item {
      display: flex; align-items: center; gap: 12px; padding: 13px 18px;
    }
    .upcoming-item:not(:last-child) { border-bottom: 0.5px solid var(--separator); }

    .upcoming-mins {
      font-size: 20px; font-weight: 700; min-width: 56px;
      color: var(--text); font-feature-settings: 'tnum';
      transition: color 0.3s ease;
    }
    .upcoming-mins.arriving { color: var(--green); }

    .upcoming-mins-unit { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .upcoming-info { flex: 1; min-width: 0; }
    .upcoming-dest {
      font-size: 14px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .upcoming-remark { font-size: 11px; color: var(--orange); font-weight: 500; }
    .upcoming-time {
      font-size: 14px; font-weight: 500; color: var(--text-tertiary);
      flex-shrink: 0; font-feature-settings: 'tnum';
    }

    /* ── Route cards ────────────────────────────── */
    .route-cards-label {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 12px;
    }

    .route-cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 32px;
    }

    .route-card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px 18px; box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .route-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

    .route-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .route-card-type { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
    .route-card-dest {
      font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .route-card-note {
      font-size: 10px; color: var(--text-tertiary); margin-bottom: 8px;
    }
    .route-card-etas { display: flex; flex-direction: column; }

    .rc-eta {
      display: flex; align-items: center; justify-content: space-between; padding: 6px 0;
    }
    .rc-eta:not(:last-child) { border-bottom: 0.5px solid var(--separator); }

    .rc-eta-mins {
      font-size: 17px; font-weight: 700; color: var(--text);
      font-feature-settings: 'tnum';
    }
    .rc-eta-mins.arriving { color: var(--green); }
    .rc-eta-unit { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
    .rc-eta-time { font-size: 13px; color: var(--text-tertiary); font-feature-settings: 'tnum'; }
    .rc-no-service {
      font-size: 13px; color: var(--text-tertiary); text-align: center;
      padding: 10px 0; font-style: italic;
    }

    /* ── Route stops ────────────────────────────── */
    .section-title {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none; transition: color 0.2s;
    }
    .section-title:hover { color: var(--text); }

    .section-title .chevron {
      transition: transform 0.25s ease; font-size: 10px; color: var(--text-tertiary);
    }
    .section-title .chevron.open { transform: rotate(90deg); }

    .route-stops {
      background: var(--card); border-radius: var(--radius);
      padding: 18px 22px; margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .route-stops.collapsed { display: none; }

    .stop-item { display: flex; align-items: flex-start; gap: 14px; }
    .stop-item:not(:last-child) { padding-bottom: 10px; }

    .timeline {
      display: flex; flex-direction: column; align-items: center;
      width: 16px; flex-shrink: 0;
    }
    .timeline-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--separator); z-index: 1; flex-shrink: 0; border: none;
    }
    .timeline-line {
      width: 1.5px; flex-grow: 1; background: var(--separator); min-height: 10px;
    }
    .stop-item.your-stop-marker .timeline-dot {
      background: var(--accent); width: 10px; height: 10px;
      box-shadow: 0 0 0 4px #007AFF20;
    }
    .stop-item.first-stop .timeline-dot,
    .stop-item.last-stop .timeline-dot {
      background: var(--text-secondary); width: 9px; height: 9px;
    }

    .stop-info { flex-grow: 1; }
    .stop-en { font-size: 14px; font-weight: 400; line-height: 1.3; color: var(--text); }
    .stop-cn { font-size: 12px; color: var(--text-tertiary); }
    .stop-item.your-stop-marker .stop-en { color: var(--accent); font-weight: 600; }

    .you-tag {
      font-size: 9px; background: var(--accent); color: #fff;
      padding: 2px 6px; border-radius: 100px; font-weight: 700;
      margin-left: 6px; vertical-align: middle; letter-spacing: 0.3px;
    }

    /* ── States ──────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); }
    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 17px; font-weight: 500; }
    .empty-state .sub { font-size: 14px; color: var(--text-tertiary); margin-top: 4px; font-weight: 400; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .spinner {
      width: 24px; height: 24px;
      border: 2.5px solid var(--separator); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 500; }

    footer {
      text-align: center; font-size: 12px; color: var(--text-tertiary); padding: 8px 0 24px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .route-cards { grid-template-columns: 1fr; }
      .hero-mins { font-size: 44px; }
      .container { padding: 20px 16px 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">HK Bus Tracker</div>
      <div class="header-location" id="headerLocation">Near 8 Mui Hing Street, Happy Valley</div>
    </header>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>

    <div class="seg-wrap">
      <div class="seg-control">
        <button class="seg-btn active" id="segHome" onclick="switchMode('home')">From Home</button>
        <button class="seg-btn" id="segWork" onclick="switchMode('work')">From Work</button>
      </div>
    </div>

    <div id="mainContent">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Fetching live data...</div>
      </div>
    </div>

    <div id="routeCardsSection" style="display:none">
      <div class="route-cards-label">By Route</div>
      <div class="route-cards" id="routeCards"></div>
    </div>

    <div id="routeStopsSection">
      <div class="section-title" onclick="toggleRoute()">
        <span class="chevron" id="chevron">&#9654;</span> <span id="routeStopsLabel">Route 1 Stops</span>
      </div>
      <div class="route-stops collapsed" id="routeStops"></div>
    </div>

    <footer>
      Data from <a href="https://data.gov.hk" target="_blank">data.gov.hk</a> &middot; Refreshes every 30s
    </footer>
  </div>

  <script>
    // ── APIs ───────────────────────────────────────────────────
    const CTB_API = 'https://rt.data.gov.hk/v2/transport/citybus';
    const GMB_API = 'https://data.etagmb.gov.hk';

    // ── Mode config ───────────────────────────────────────────
    const MODES = {
      home: {
        locationText: 'Near 8 Mui Hing Street, Happy Valley',
        stopName: 'Kwai Fong Street, Sing Woo Road',
        stopNameCn: '桂芳街, 成和道',
        stopNote: '',
        routeStopsLabel: 'Route 1 Stops',
        routes: [
          {
            id: 'r1', label: '1', type: 'bus', cls: 'r1',
            dest: 'Central (Macao Ferry)', dir: 'I',
            fetchUrl: `${CTB_API}/eta/CTB/002492/1`
          },
          {
            id: 'r8x', label: '8X', type: 'bus', cls: 'r8x',
            dest: 'Siu Sai Wan (Island Resort)', dir: 'I',
            fetchUrl: `${CTB_API}/eta/CTB/002492/8X`
          },
          {
            id: 'r1m', label: '1M', type: 'bus', cls: 'r1m',
            dest: 'Exhibition Centre Station', dir: 'I',
            fetchUrl: `${CTB_API}/eta/CTB/002492/1M`
          },
          {
            id: 'gmb30', label: '30', type: 'minibus', cls: 'gmb',
            dest: 'Causeway Bay (Lan Fong Rd)',
            fetchUrl: `${GMB_API}/eta/route-stop/2003472/2/3`
          }
        ],
        stops: [
          { id: '002403', en: 'Happy Valley (Upper)', tc: '跑馬地 (上)' },
          { id: '002402', en: 'Green Lane, Blue Pool Road', tc: '箕璉坊, 藍塘道' },
          { id: '002492', en: 'Kwai Fong Street, Sing Woo Road', tc: '桂芳街, 成和道', isYou: true },
          { id: '002493', en: 'Village Road, Sing Woo Road', tc: '山村道, 成和道' },
          { id: '002453', en: 'King Kwong Street', tc: '景光街' },
          { id: '002552', en: 'HK Sanatorium & Hospital, Wong Nai Chung Rd', tc: '養和醫院, 黃泥涌道' },
          { id: '002553', en: 'Happy Valley Racecourse, Wong Nai Chung Rd', tc: '跑馬地馬場, 黃泥涌道' },
          { id: '002467', en: 'Lap Tak Lane, Morrison Hill Road', tc: '立德里, 摩理臣山道' },
          { id: '002566', en: 'The Charterhouse, Wan Chai Road', tc: '利景酒店, 灣仔道' },
          { id: '002537', en: 'Bullock Lane, Wan Chai Road', tc: '普樂里, 灣仔道' },
          { id: '002446', en: 'Southorn Playground, Hennessy Road', tc: '修頓球場, 軒尼詩道' },
          { id: '002449', en: 'Anton Street, Hennessy Road', tc: '晏頓街, 軒尼詩道' },
          { id: '001140', en: 'Admiralty - Pacific Place, Queensway', tc: '金鐘 - 太古廣場, 金鐘道' },
          { id: '001142', en: 'Bank of China Tower, Queensway', tc: '中銀大廈, 金鐘道' },
          { id: '001054', en: 'The Landmark, Des Voeux Road Central', tc: '置地廣場, 德輔道中' },
          { id: '001056', en: 'Central Market, Des Voeux Road Central', tc: '中環街市, 德輔道中' },
          { id: '001175', en: 'Cleverly Street, Des Voeux Road Central', tc: '急庇利街, 德輔道中' },
          { id: '001027', en: 'Central (Macao Ferry)', tc: '中環 (港澳碼頭)' },
        ]
      },
      work: {
        locationText: 'Near Viva Place, 36 Heung Yip Road, Wong Chuk Hang',
        stopName: 'Wong Chuk Hang Road No. 23',
        stopNameCn: '黃竹坑道23號',
        stopNote: 'Route 72 boards from WCH Recreation Ground (~3 min walk)',
        routeStopsLabel: 'Route 5 Stops',
        routes: [
          {
            id: 'gmb5', label: '5', type: 'minibus', cls: 'gmb5',
            dest: 'Happy Valley via Shouson Hill',
            note: 'Alight at Blue Pool Rd \u2014 2 min walk',
            fetchUrl: `${GMB_API}/eta/route-stop/2004081/1/3`
          },
          {
            id: 'r72', label: '72', type: 'bus', cls: 'r72',
            dest: 'Causeway Bay (Moreton Terrace)', dir: 'O',
            note: 'Alight at Morrison Hill \u2014 8 min walk',
            fetchUrl: `${CTB_API}/eta/CTB/002345/72`
          },
          {
            id: 'gmb4c', label: '4C', type: 'minibus', cls: 'gmb4c',
            dest: 'Causeway Bay (Cannon St)',
            note: 'Every 5 min \u2014 alight CWB, 15 min walk',
            fetchUrl: `${GMB_API}/eta/route-stop/2004097/1/4`
          }
        ],
        stops: [
          { id: 's1', en: 'Aberdeen (Nam Ning Street)', tc: '南寧街, 海晶閣外' },
          { id: 's2', en: 'No. 178 Aberdeen Main Road', tc: '香港仔大道178號' },
          { id: 's3', en: 'Wong Chuk Hang Road No. 23', tc: '黃竹坑道23號', isYou: true },
          { id: 's4', en: '49 Wong Chuk Hang Road', tc: '黃竹坑道49號' },
          { id: 's5', en: 'Wong Chuk Hang San Wai', tc: '黃竹坑新圍' },
          { id: 's6', en: 'Shouson Hill Road No. 3A', tc: '壽山村道3A號' },
          { id: 's7', en: 'Near Shouson Hill Road West', tc: '近壽臣山道西' },
          { id: 's8', en: 'Shouson Hill Road East No. 1', tc: '壽山村道東1號' },
          { id: 's9', en: 'Deep Water Bay Rd, Manderly Garden', tc: '深水灣道, 文禮苑外' },
          { id: 's10', en: 'Deep Water Bay Rd, near Rockybank', tc: '深水灣道, 近石廬' },
          { id: 's11', en: 'Wong Nai Chung Gap Rd, opp Cricket Club', tc: '黃泥涌峽道, 對面木球會' },
          { id: 's12', en: 'Blue Pool Road, near Green Lane', tc: '藍塘道, 近箕璉坊' },
          { id: 's13', en: 'Blue Pool Road, near Horseshoe Tower', tc: '藍塘道, 近蹄甲村' },
          { id: 's14', en: 'Lockhart Road, Causeway Bay Plaza', tc: '駱克道, 銅鑼灣廣場外' },
          { id: 's15', en: 'Jaffe Road No. 500', tc: '謝斐道500號' },
        ]
      }
    };

    // ── State ──────────────────────────────────────────────────
    let currentMode = 'home';
    let refreshTimer = null;

    // ── Utilities ──────────────────────────────────────────────
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString('en-HK', { hour:'2-digit', minute:'2-digit', hour12:false });
    }

    function minsUntil(iso) {
      return Math.round((new Date(iso) - new Date()) / 60000);
    }

    function minsDisplay(m) {
      if (m <= 0) return { text: 'Now', arriving: true };
      if (m === 1) return { text: '1', arriving: true };
      return { text: String(m), arriving: false };
    }

    // ── Data Fetching ──────────────────────────────────────────
    async function fetchCTB(route) {
      const res = await fetch(route.fetchUrl);
      if (!res.ok) return [];
      const json = await res.json();
      return json.data
        .filter(d => d.dir === route.dir && d.eta)
        .map(d => ({
          eta: d.eta,
          mins: minsUntil(d.eta),
          dest: d.dest_en || route.dest,
          remark: d.rmk_en || '',
          routeId: route.id,
          routeLabel: route.label,
          routeCls: route.cls,
          routeType: 'Citybus',
          routeNote: route.note || '',
        }));
    }

    async function fetchGMB(route) {
      const res = await fetch(route.fetchUrl);
      if (!res.ok) return [];
      const json = await res.json();
      if (!json.data || !json.data.enabled) return [];
      const list = json.data.eta || [];
      return list
        .filter(e => e.timestamp)
        .map(e => ({
          eta: e.timestamp,
          mins: minsUntil(e.timestamp),
          dest: route.dest,
          remark: e.remarks_en || '',
          routeId: route.id,
          routeLabel: route.label,
          routeCls: route.cls,
          routeType: 'GMB',
          routeNote: route.note || '',
        }));
    }

    async function fetchAll() {
      const mode = MODES[currentMode];
      const results = await Promise.allSettled(
        mode.routes.map(r => r.type === 'minibus' ? fetchGMB(r) : fetchCTB(r))
      );
      const byRoute = {};
      const combined = [];

      results.forEach((res, i) => {
        const etas = res.status === 'fulfilled' ? res.value : [];
        byRoute[mode.routes[i].id] = etas;
        combined.push(...etas);
      });

      combined.sort((a, b) => a.mins - b.mins);
      return { byRoute, combined };
    }

    // ── Rendering ──────────────────────────────────────────────
    function renderMain(combined) {
      const el = document.getElementById('mainContent');
      const mode = MODES[currentMode];

      if (combined.length === 0) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">\u{1F319}</div>
            <p>No service right now</p>
            <p class="sub">Buses and minibuses will appear here when running.</p>
          </div>`;
        return;
      }

      const next = combined[0];
      const md = minsDisplay(next.mins);

      let html = `
        <div class="feed-section">
          <div class="section-label">Your Stop</div>
          <div class="stop-name-header">${mode.stopName}</div>
          <div class="stop-name-header-cn">${mode.stopNameCn}</div>
          ${mode.stopNote ? `<div class="stop-note">${mode.stopNote}</div>` : ''}
        </div>

        <div class="hero-card">
          <div class="hero-top">
            <span class="route-tag ${next.routeCls}">${next.routeLabel}</span>
            <span class="hero-label">Next departure</span>
          </div>
          <div class="hero-body">
            <div>
              <span class="hero-mins ${md.arriving ? 'arriving' : ''}">${md.text}</span>
              <span class="hero-unit">${md.arriving && md.text === 'Now' ? '' : 'min'}</span>
            </div>
            <div class="hero-right">
              <div class="hero-dest">${next.dest}</div>
              <div class="hero-abs">${fmtTime(next.eta)}</div>
            </div>
          </div>
        </div>
      `;

      const upcoming = combined.slice(1, 7);
      if (upcoming.length > 0) {
        html += `<div class="upcoming-list">`;
        for (const item of upcoming) {
          const d = minsDisplay(item.mins);
          html += `
            <div class="upcoming-item">
              <span class="route-tag ${item.routeCls}">${item.routeLabel}</span>
              <div class="upcoming-mins ${d.arriving ? 'arriving' : ''}">
                ${d.text}<span class="upcoming-mins-unit">${d.arriving && d.text === 'Now' ? '' : ' min'}</span>
              </div>
              <div class="upcoming-info">
                <div class="upcoming-dest">${item.dest}</div>
                ${item.remark ? `<div class="upcoming-remark">${item.remark}</div>` : ''}
              </div>
              <div class="upcoming-time">${fmtTime(item.eta)}</div>
            </div>`;
        }
        html += `</div>`;
      }

      el.innerHTML = html;
    }

    function renderRouteCards(byRoute) {
      const mode = MODES[currentMode];
      document.getElementById('routeCardsSection').style.display = '';
      const el = document.getElementById('routeCards');
      let html = '';

      for (const route of mode.routes) {
        const etas = byRoute[route.id] || [];
        html += `
          <div class="route-card">
            <div class="route-card-header">
              <span class="route-tag ${route.cls}">${route.label}</span>
              <span class="route-card-type">${route.type === 'minibus' ? 'Minibus' : 'Citybus'}</span>
            </div>
            <div class="route-card-dest">${route.dest}</div>
            ${route.note ? `<div class="route-card-note">${route.note}</div>` : ''}
            <div class="route-card-etas">`;

        if (etas.length === 0) {
          html += `<div class="rc-no-service">No service now</div>`;
        } else {
          for (const eta of etas.slice(0, 3)) {
            const d = minsDisplay(eta.mins);
            html += `
              <div class="rc-eta">
                <div class="rc-eta-mins ${d.arriving ? 'arriving' : ''}">${d.text} <span class="rc-eta-unit">${d.arriving && d.text === 'Now' ? '' : 'min'}</span></div>
                <div class="rc-eta-time">${fmtTime(eta.eta)}</div>
              </div>`;
          }
        }
        html += `</div></div>`;
      }

      el.innerHTML = html;
    }

    function renderRouteStops() {
      const mode = MODES[currentMode];
      const el = document.getElementById('routeStops');
      document.getElementById('routeStopsLabel').textContent = mode.routeStopsLabel;

      el.innerHTML = mode.stops.map((stop, i) => {
        const isYours = stop.isYou;
        const isFirst = i === 0;
        const isLast = i === mode.stops.length - 1;
        let cls = 'stop-item';
        if (isYours) cls += ' your-stop-marker';
        if (isFirst) cls += ' first-stop';
        if (isLast) cls += ' last-stop';
        return `
          <div class="${cls}">
            <div class="timeline">
              <div class="timeline-dot"></div>
              ${!isLast ? '<div class="timeline-line"></div>' : ''}
            </div>
            <div class="stop-info">
              <div class="stop-en">${stop.en}${isYours ? '<span class="you-tag">YOU</span>' : ''}</div>
              <div class="stop-cn">${stop.tc}</div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleRoute() {
      document.getElementById('routeStops').classList.toggle('collapsed');
      document.getElementById('chevron').classList.toggle('open');
    }

    function updateStatus(ok, msg) {
      document.getElementById('statusDot').className = ok ? 'status-dot' : 'status-dot error';
      document.getElementById('statusText').textContent = msg;
    }

    // ── Mode switching ─────────────────────────────────────────
    function switchMode(mode) {
      currentMode = mode;

      document.getElementById('segHome').className = mode === 'home' ? 'seg-btn active' : 'seg-btn';
      document.getElementById('segWork').className = mode === 'work' ? 'seg-btn active' : 'seg-btn';
      document.getElementById('headerLocation').textContent = MODES[mode].locationText;

      // Collapse stops on switch
      document.getElementById('routeStops').classList.add('collapsed');
      document.getElementById('chevron').classList.remove('open');

      // Show loading
      document.getElementById('mainContent').innerHTML = `
        <div class="loading"><div class="spinner"></div>
        <div class="loading-text">Fetching live data...</div></div>`;
      document.getElementById('routeCardsSection').style.display = 'none';

      renderRouteStops();
      refresh();

      // Reset timer
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(refresh, 30000);
    }

    // ── Main loop ──────────────────────────────────────────────
    async function refresh() {
      try {
        const { byRoute, combined } = await fetchAll();
        renderMain(combined);
        renderRouteCards(byRoute);
        const now = new Date();
        updateStatus(true, `Live \u00b7 Updated ${now.toLocaleTimeString('en-HK', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false })}`);
      } catch (err) {
        console.error('Refresh error:', err);
        updateStatus(false, 'Error fetching data \u2014 retrying...');
      }
    }

    // ── Init ───────────────────────────────────────────────────
    renderRouteStops();
    refresh();
    refreshTimer = setInterval(refresh, 30000);
  </script>
</body>
</html>
